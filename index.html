<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apprendre le Tadaksahak</title>
  <link rel="icon" href="images/idaksahak_round.png" type="image/png" />
  <meta name="description" content="Outil interactif pour apprendre le vocabulaire Tadaksahak avec audio et quiz." />
  <meta property="og:title" content="Apprendre le Tadaksahak" />
  <meta property="og:description" content="Découvrez le vocabulaire tadaksahak avec des sons et quiz interactifs." />
  <meta property="og:image" content="images/idaksahak_square_512.png" />

  <style>
    :root {
      --fond-principal: #fcebd5;
      --texte-principal: #4b2e1f;
      --accent: #d9822b;
      --ombre: rgba(0, 0, 0, 0.1);
      --fond-carte: #fff5e1;
      --bouton: #c75c24;
      --bouton-texte: #fff;
      --bouton-hover: #a7491d;
    }

    body {
      background-color: var(--fond-principal);
      color: var(--texte-principal);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 1rem;
    }

    main {
      background-color: var(--fond-carte);
      border-radius: 12px;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 4px 12px var(--ombre);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo img {
      width: 120px;
      margin: 0.5rem;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .rond img {
      border-radius: 50%;
    }

    #motTexte {
      font-size: 2rem;
      font-weight: bold;
    }

    #definition {
      font-size: 1.2rem;
      margin-top: 0.5rem;
    }

    #compteur {
      margin-top: 1rem;
      font-style: italic;
      color: #6e4a31;
    }

    #navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    button {
      background-color: var(--bouton);
      color: var(--bouton-texte);
      border: none;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      width: 48%;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: var(--bouton-hover);
    }

    #searchBar {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      border: 1px solid #d9822b;
      border-radius: 8px;
    }

    .quiz button.audio {
      background-color: transparent;
      color: var(--accent);
      font-size: 1.2rem;
      padding: 0.2rem;
      width: auto;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #7c5c44;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <img src="images/idaksahak_square_512.png" alt="Logo carré">
      <img src="images/idaksahak_round.png" alt="Logo rond" class="rond">
    </div>

    <input id="searchBar" type="text" placeholder="Chercher un mot..." oninput="rechercherMot()" />
    <div id="mot">
      <h2 id="motTexte">...</h2>
      <p id="definition">...</p>
      <p id="compteur">1 / 50</p>
      <div id="audioButtons">
        <button onclick="jouerTadaksahak()">▶️ Écouter</button>
        <button onclick="rejouerMot()">⟳ Rejouer</button>
        <button onclick="lectureAuto()">▶️ Lecture automatique</button>
      </div>
      <div id="navigation">
        <button onclick="motPrecedent()">◀️ Précédent</button>
        <button onclick="motSuivant()">Suivant ▶️</button>
      </div>
    </div>

    <div class="quiz" style="margin-top: 2rem;">
      <h2 id="quizMot">...</h2>
      <div id="quizOptions"></div>
      <p id="quizResult"></p>
      <p id="quizScore">Score : 0 / 0</p>
      <button onclick="lancerQuiz()">Nouvelle question</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 • Tadaksahak Learning</p>
  </footer>

  <script>
    const BASE_URL = "https://hamadine.github.io/Tadaksahak-Learning/gitkeep/";
    const mots = [/* ... Ton tableau de mots actuel ... */];

    let index = 0;
    let lectureActive = false;
    let autoLectureTimeout;
    let score = 0;
    let total = 0;

    function afficherMot() {
      const motActuel = mots[index];
      document.getElementById("motTexte").innerText = motActuel.mot;
      document.getElementById("definition").innerText = motActuel.def;
      document.getElementById("compteur").innerText = `${index + 1} / ${mots.length}`;
    }

    function motSuivant() {
      index = (index + 1) % mots.length;
      afficherMot();
    }

    function motPrecedent() {
      index = (index - 1 + mots.length) % mots.length;
      afficherMot();
    }

    function jouerTadaksahak(i = index) {
      const audio = new Audio(BASE_URL + mots[i].audioMot);
      audio.play().catch(e => alert("Audio indisponible : " + e.message));
    }

    function rejouerMot() {
      jouerTadaksahak(index);
    }

    function lectureAuto() {
      if (lectureActive) {
        lectureActive = false;
        clearTimeout(autoLectureTimeout);
        alert("Lecture automatique arrêtée.");
        return;
      }
      lectureActive = true;
      lectureMot(index);
    }

    function lectureMot(i) {
      if (!lectureActive || i >= mots.length) {
        lectureActive = false;
        return;
      }
      index = i;
      afficherMot();
      jouerTadaksahak(i);
      autoLectureTimeout = setTimeout(() => {
        lectureMot(i + 1);
      }, 4000);
    }

    function rechercherMot() {
      const terme = document.getElementById("searchBar").value.toLowerCase();
      const found = mots.find(m => m.mot.toLowerCase().includes(terme));
      if (found) {
        index = mots.indexOf(found);
        afficherMot();
      } else {
        document.getElementById("motTexte").innerText = "Mot non trouvé";
        document.getElementById("definition").innerText = "";
        document.getElementById("compteur").innerText = "";
      }
    }

    function lancerQuiz() {
      const i = Math.floor(Math.random() * mots.length);
      const motChoisi = mots[i];
      document.getElementById("quizMot").innerHTML =
        `${motChoisi.mot} <button class="audio" onclick="jouerTadaksahak(${i})" aria-label="Écouter la prononciation">▶️</button>`;
      const options = [motChoisi.def];
      while (options.length < 4) {
        const def = mots[Math.floor(Math.random() * mots.length)].def;
        if (!options.includes(def)) options.push(def);
      }
      options.sort(() => Math.random() - 0.5);
      const quizOptions = document.getElementById("quizOptions");
      quizOptions.innerHTML = "";
      options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.onclick = () => {
          const result = document.getElementById("quizResult");
          total++;
          if (opt === motChoisi.def) {
            score++;
            result.innerText = "Bonne réponse !";
            result.style.color = "green";
          } else {
            result.innerText = `Faux. Réponse correcte : ${motChoisi.def}`;
            result.style.color = "red";
          }
          document.getElementById("quizScore").innerText = `Score : ${score} / ${total}`;
          Array.from(quizOptions.children).forEach(b => b.disabled = true);
        };
        quizOptions.appendChild(btn);
      });
    }

    window.onload = () => {
      afficherMot();
      lancerQuiz();
    };
  </script>
</body>
</html>
