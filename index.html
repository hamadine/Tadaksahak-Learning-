<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apprendre le Tadaksahak</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div id="mot">
        <h2 id="motTexte">Konàri</h2>
        <p id="definition">Allons-y (action d'être accompagné quelque part)</p>
        <p id="compteur">1 / 70</p>

        <div id="navigation">
          <button onclick="motPrecedent()">◀️ Précédent</button>
          <button onclick="motSuivant()">Suivant ▶️</button>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2025 • Tadaksahak Learning</p>
    </footer>

    <script>
      const mots = [
        { mot: "Konàri", def: "Allons-y (action d'être accompagné quelque part)" },
        { mot: "íbatan", def: "balle (écorce de céréales)" },
        { mot: "Wéyni", def: "soleil" },
        { mot: "asaher", def: "couvercle" },
        { mot: "Yaw", def: "Viens — Ordre de venir" },
        { mot: "aférig", def: "enclo" },
        { mot: "hoùwa", def: "lait" },
        { mot: "Tchòho", def: "Quoi?" },
        { mot: "Dida", def: "Pars" },
        { mot: "Koy", def: "Vas-y (ordre)" },
        { mot: "Nín", def: "Toi" },
        { mot: "Zawkat", def: "Amène" },
        { mot: "Mànà", def: "Il, c'est où ?" },
        { mot: "Mané?", def: "Où?" },
        { mot: "Àtchi", def: "Il a dit" },
        { mot: "Zàrod", def: "Aujourd’hui" },
        { mot: "Zornád", def: "Avant-hier" },
        { mot: "Tifak", def: "Demain" },
        { mot: "Tchindén", def: "Certains, d'autres" },
        { mot: "Yílli", def: "Sors" },
        { mot: "Bî", def: "Hier (homonyme d'ombre dans certaines phrases)" },
        { mot: "Zarossé", def: "Après-demain" },
        { mot: "Abéér", def: "C'est grand ou gros" },
        { mot: "Atchéna", def: "C'est petit ou peu" },
        { mot: "Tùgùdou", def: "L'arbre" },
        { mot: "Yow", def: "La chamelle" },
        { mot: "Féédji", def: "Le mouton" },
        { mot: "Híntchini", def: "La chèvre" },
        { mot: "Bààri", def: "Le cheval" },
        { mot: "Gànda", def: "La terre ou le pays" },
        { mot: "Tôrouf", def: "La voiture" },
        { mot: "Aŷâr", def: "La lune" },
        { mot: "Tchéédi", def: "La cuillère" },
        { mot: "Al-fâjér", def: "Le matin" },
        { mot: "Tchídjí", def: "La nuit" },
        { mot: "Tààlast", def: "L'obscurité" },
        { mot: "Yéy", def: "La fraîcheur" },
        { mot: "Kôrrà", def: "La chaleur" },
        { mot: "Foûfoü", def: "Le froid" },
        { mot: "Zûkmouź", def: "Grattes (ordre de gratter)" },
        { mot: "Gùnğŭ", def: "Le ventre" },
        { mot: "Bãngŭ", def: "La tête" },
        { mot: "Bàngou", def: "Le puits" },
        { mot: "Kánmba", def: "La main" },
        { mot: "Kánmbén", def: "Les mains" },
        { mot: "Mô", def: "L'œil" },
        { mot: "Môoń", def: "Les yeux" },
        { mot: "Hàńga", def: "L'oreille" },
        { mot: "Hàńdjén", def: "Les oreilles" },
        { mot: "Àadad", def: "Le doigt" },
        { mot: "Àchkâr", def: "L'ongle" },
        { mot: "Àdída", def: "Il est parti" },
        { mot: "Akó", def: "Il, c'est allé" },
        { mot: "Ákatab", def: "Une écriture" },
        { mot: "Atri", def: "L'étoile" },
        { mot: "Ítràn", def: "Les étoiles" },
        { mot: "Djíndjiri", def: "La prière" },
        { mot: "Taṣ̌ṣ̌aĺit", def: "La fête" },
        { mot: "Oúṣ̌ṣ̌ûm", def: "Le jeûne" },
        { mot: "Àlwâq", def: "L'heure" },
        { mot: "Ažžãmán", def: "Le temps" },
        { mot: "Tsĥími", def: "La vérité" },
        { mot: "Tsĥídi", def: "Le sel" },
        { mot: "Âssakúr", def: "Le sucre" },
        { mot: "Djî", def: "L'huile" },
        { mot: "Hààmoú", def: "La viande" },
        { mot: "Hâwrou", def: "Le repas" },
        { mot: "Ammúnṣṣou", def: "La nourriture" }
      ];

      let index = 0;

      function afficherMot() {
        const motActuel = mots[index];
        document.getElementById("motTexte").innerText = motActuel.mot;
        document.getElementById("definition").innerText = motActuel.def;
        document.getElementById("compteur").innerText = `${index + 1} / ${mots.length}`;
      }

      function motSuivant() {
        index = (index + 1) % mots.length;
        afficherMot();
      }

      function motPrecedent() {
        index = (index - 1 + mots.length) % mots.length;
        afficherMot();
      }

      window.onload = afficherMot;
    </script>
  </body>
</html>
