<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dictionnaire Tadaksahak</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2e6dc;
      margin: 0;
      padding: 2rem;
      color: #3e1f0d;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: auto;
    }
    input {
      width: 80%;
      padding: 10px;
      margin-bottom: 20px;
      border: 2px solid #c97c39;
      border-radius: 5px;
      font-size: 1rem;
    }
    button {
      background: #c97c39;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #a9612b;
    }
    .mot {
      font-size: 2rem;
      font-weight: bold;
    }
    .def {
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <input type="text" id="search" placeholder="Chercher un mot..." />
    <div class="mot" id="mot">---</div>
    <div class="def" id="def">Définition ici</div>
    <audio id="audio" controls></audio>
    <div>
      <button onclick="playAudio()">Écouter</button>
      <button onclick="nextWord()">Nouvelle question</button>
    </div>
  </div>

  <script>
    const BASE_URL = "https://raw.githubusercontent.com/hamadine/Tadaksahak-Learning-/main/";

    const mots = [
      { mot: "ábér", def: "C'est grand ou gros", audioMot: "aber_mot.mp3" },
      { mot: "ízar", def: "Le matin", audioMot: "izar_mot.mp3" },
      { mot: "ágat", def: "Il est parti", audioMot: "agat_mot.mp3" },
      { mot: "ámás", def: "ramassez", audioMot: "amas_mot.mp3" },
      { mot: "ákkát", def: "attrape-le, attrape ça", audioMot: "akkat_mot.mp3" }
    ];

    let current = 0;

    function showWord(index) {
      const motData = mots[index];
      document.getElementById("mot").textContent = motData.mot;
      document.getElementById("def").textContent = motData.def;
      const audio = document.getElementById("audio");
      audio.src = BASE_URL + motData.audioMot;
      audio.load();
    }

    function nextWord() {
      current = (current + 1) % mots.length;
      showWord(current);
    }

    function playAudio() {
      const audio = document.getElementById("audio");
      audio.play();
    }

    document.getElementById("search").addEventListener("input", function () {
      const val = this.value.toLowerCase();
      const found = mots.find(m => m.mot.toLowerCase().includes(val));
      if (found) {
        current = mots.indexOf(found);
        showWord(current);
      }
    });

    // Init first word
    showWord(current);
  </script>
</body>
</html>
