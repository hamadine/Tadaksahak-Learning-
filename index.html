<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apprendre le Tadaksahak</title>
  <style>
    :root {
      --fond-principal: #fcebd5;
      --texte-principal: #4b2e1f;
      --accent: #d9822b;
      --ombre: rgba(0, 0, 0, 0.1);
      --fond-carte: #fff5e1;
      --bouton: #c75c24;
      --bouton-texte: #fff;
      --bouton-hover: #a7491d;
    }

    body {
      background-color: var(--fond-principal);
      color: var(--texte-principal);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 1rem;
    }

    main {
      background-color: var(--fond-carte);
      border-radius: 12px;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 4px 12px var(--ombre);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo img {
      width: 120px;
      margin: 0.5rem;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .rond img {
      border-radius: 50%;
    }

    #motTexte {
      font-size: 2rem;
      font-weight: bold;
    }

    #definition {
      font-size: 1.2rem;
      margin-top: 0.5rem;
    }

    #compteur {
      margin-top: 1rem;
      font-style: italic;
      color: #6e4a31;
    }

    #navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    button {
      background-color: var(--bouton);
      color: var(--bouton-texte);
      border: none;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      width: 48%;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: var(--bouton-hover);
    }

    #searchBar {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      border: 1px solid #d9822b;
      border-radius: 8px;
    }

    .quiz button.audio {
      background-color: transparent;
      color: var(--accent);
      font-size: 1.2rem;
      padding: 0.2rem;
      width: auto;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #7c5c44;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">
      <img src="images/idaksahak_square_512.png" alt="Logo carré">
      <img src="images/idaksahak_round.png" alt="Logo rond" class="rond">
    </div>

    <input id="searchBar" type="text" placeholder="Chercher un mot..." oninput="rechercherMot()" />
    <div id="mot">
      <h2 id="motTexte">...</h2>
      <p id="definition">...</p>
      <p id="compteur">1 / 50</p>
      <div id="audioButtons">
        <button onclick="jouerTadaksahak()">▶️ Écouter</button>
      </div>
      <div id="navigation">
        <button onclick="motPrecedent()">◀️ Précédent</button>
        <button onclick="motSuivant()">Suivant ▶️</button>
      </div>
    </div>

    <div class="quiz" style="margin-top: 2rem;">
      <h2 id="quizMot">...</h2>
      <div id="quizOptions"></div>
      <p id="quizResult"></p>
      <button onclick="lancerQuiz()">Nouvelle question</button>
    </div>
  </main><footer>
    <p>&copy; 2025 • Tadaksahak Learning</p>
  </footer>

  <script>
    const BASE_URL = "https://raw.githubusercontent.com/hamadine/Tadaksahak-Learning-/main/geetkeep/";

    const mots = [
      { mot: "ábér", def: "C'est grand ou gros", audioMot: "aber_mot.mp3" },
      { mot: "abôrâ", def: "Le sorgho", audioMot: "abora_mot.mp3" },
      { mot: "âcci", def: "Il a dit", audioMot: "acci_mot.mp3" },
      { mot: "adabàra", def: "Solution", audioMot: "adabara_mot.mp3" },
      { mot: "ádǝbǝt", def: "Il, ça peut", audioMot: "adebet_mot.mp3" },
      { mot: "ádǝda", def: "Il est parti", audioMot: "adeda_mot.mp3" },
      { mot: "aférig", def: "Enclos", audioMot: "aferig_mot.mp3" },
      { mot: "ákatab", def: "Une écriture", audioMot: "akatab_mot.mp3" },
      { mot: "akô", def: "Il, c'est allé", audioMot: "ako_mot.mp3" },
      { mot: "alfâjér", def: "Le matin", audioMot: "alfajer_mot.mp3" },
      { mot: "àlwâq", def: "L’heure", audioMot: "alwaq_mot.mp3" },
      { mot: "Ammúnṣṣû", def: "La nourriture", audioMot: "ammunssu_mot.mp3" },
      { mot: "aṣahar", def: "Couvercle", audioMot: "asahar_mot.mp3" },
      { mot: "asǝmid", def: "Semoule de blé", audioMot: "asimid_mot.mp3" },
      { mot: "átri", def: "L’étoile", audioMot: "atri_mot.mp3" },
      { mot: "ážžãmán", def: "Le temps", audioMot: "azzaman_mot.mp3" },
      { mot: "bàngû", def: "Le puits", audioMot: "bangu_mot.mp3" },
      { mot: "bãngû", def: "La tête", audioMot: "bangu2_mot.mp3" },
      { mot: "bààri", def: "Le cheval", audioMot: "baari_mot.mp3" },
      { mot: "ccéédi", def: "La cuillère", audioMot: "ccedi_mot.mp3" },
      { mot: "ccídi", def: "Le sel", audioMot: "ccidi_mot.mp3" },
      { mot: "ccíjí", def: "La nuit", audioMot: "cciji_mot.mp3" },
      { mot: "ccími", def: "La vérité", audioMot: "ccimi_mot.mp3" },
      { mot: "ccindén", def: "Certains, d'autres", audioMot: "ccinden_mot.mp3" },
      { mot: "Tchòho", def: "Quoi ?", audioMot: "ccoho_mot.mp3" },
      { mot: "ccûdû", def: "Ramasses", audioMot: "ccudu_mot.mp3" },
      { mot: "Dida", def: "Pars", audioMot: "dida_mot.mp3" },
      { mot: "dina", def: "Attrape-le", audioMot: "dina_mot.mp3" },
      { mot: "dini", def: "Tiens", audioMot: "dini_mot.mp3" },
      { mot: "Féédji", def: "Le mouton", audioMot: "feji_mot.mp3" },
      { mot: "Foûfoü", def: "Le froid", audioMot: "fufu_mot.mp3" },
      { mot: "Gànda", def: "La terre", audioMot: "ganda_mot.mp3" },
      { mot: "gôrâ", def: "Assieds-toi", audioMot: "gora_mot.mp3" },
      { mot: "Gùnğŭ", def: "Le ventre", audioMot: "gungu_mot.mp3" },
      { mot: "Hààmoú", def: "La viande", audioMot: "hamu_mot.mp3" },
      { mot: "íbatan", def: "Balle (écorce)", audioMot: "ibatan_mot.mp3" },
      { mot: "Koy", def: "Vas-y (ordre)", audioMot: "koy_mot.mp3" },
      { mot: "Koykât", def: "Viens !", audioMot: "koykat_mot.mp3" },
      { mot: "Tifak", def: "Demain", audioMot: "tifak_mot.mp3" },
      { mot: "Wa ccûdû", def: "Ramassez", audioMot: "waccudu_mot.mp3" },
      { mot: "Wa dina", def: "Attrapez-le", audioMot: "wadina_mot.mp3" },
      { mot: "Wa gôra", def: "Asseyez-vous", audioMot: "wagora_mot.mp3" },
      { mot: "Wa ŋâ", def: "Mangez", audioMot: "wanga_mot.mp3" },
      { mot: "Wa zûrû", def: "Courez", audioMot: "wazuru_mot.mp3" },
      { mot: "Yaw", def: "Viens", audioMot: "yaw_mot.mp3" },
      { mot: "Yílii", def: "Sors", audioMot: "yili_mot.mp3" },
      { mot: "Zàrod", def: "Aujourd’hui", audioMot: "zarod_mot.mp3" },
      { mot: "Zarossé", def: "Après-demain", audioMot: "zarose_mot.mp3" },
      { mot: "Zornád", def: "Avant-hier", audioMot: "zornad_mot.mp3" },
      { mot: "Zûrû", def: "Coures", audioMot: "zuru_mot.mp3" }
    ];

    let index = 0;function afficherMot() {
      const motActuel = mots[index];
      document.getElementById("motTexte").innerText = motActuel.mot;
      document.getElementById("definition").innerText = motActuel.def;
      document.getElementById("compteur").innerText = `${index + 1} / ${mots.length}`;
    }

    function motSuivant() {
      index = (index + 1) % mots.length;
      afficherMot();
    }

    function motPrecedent() {
      index = (index - 1 + mots.length) % mots.length;
      afficherMot();
    }

    function jouerTadaksahak(i = index) {
      const audio = new Audio(BASE_URL + mots[i].audioMot);
      audio.play().catch(e => alert("Audio indisponible : " + e.message));
    }

    function rechercherMot() {
      const terme = document.getElementById("searchBar").value.toLowerCase();
      const found = mots.find((m) => m.mot.toLowerCase().includes(terme));
      if (found) {
        index = mots.indexOf(found);
        afficherMot();
      }
    }

    function lancerQuiz() {
      const i = Math.floor(Math.random() * mots.length);
      const motChoisi = mots[i];
      document.getElementById("quizMot").innerHTML = `${motChoisi.mot} <button class="audio" onclick="jouerTadaksahak(${i})">▶️</button>`;
      const options = [motChoisi.def];
      while (options.length < 4) {
        const def = mots[Math.floor(Math.random() * mots.length)].def;
        if (!options.includes(def)) options.push(def);
      }
      options.sort(() => Math.random() - 0.5);
      const quizOptions = document.getElementById("quizOptions");
      quizOptions.innerHTML = "";
      options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.onclick = () => {
          document.getElementById("quizResult").innerText = opt === motChoisi.def
            ? "Bonne réponse !"
            : `Faux. Réponse correcte : ${motChoisi.def}`;
        };
        quizOptions.appendChild(btn);
      });
    }

    window.onload = () => {
      afficherMot();
      lancerQuiz();
    };
  </script>
</body>
</html>
