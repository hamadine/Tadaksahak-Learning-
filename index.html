<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apprendre le Tadaksahak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div id="mot">
      <h2 id="motTexte">konàri</h2>
      <p id="definition">Allons-y (action d'être accompagné quelque part)</p>
      <p id="compteur">1 / 100</p>

      <div id="navigation">
        <button onclick="motPrecedent()">◀️ Précédent</button>
        <button onclick="motSuivant()">Suivant ▶️</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 • Tadaksahak Learning</p>
  </footer>

  <script>

      { mot: "adibit", def: "il, ça peut" },
      { mot: "adída", def: "Il est parti" },
      { mot: "akó", def: "Il, c'est allé" },
      { mot: "âcci", def: "Il a dit" },
      { mot: "ccoho", def: "Quoi?" },
      { mot: "ccindén", def: "Certains, d'autres" },
      { mot: "ccídi", def: "Le sel" },
      { mot: "ccími", def: "La vérité" },
      { mot: "ccédi", def: "La cuillère" },
      { mot: "ccíjí", def: "La nuit" },
      { mot: "ccûdû", def: "ramasses" },
      { mot: "dida", def: "Pars" },
      { mot: "dina", def: "attrape le, attrape ça" },
      { mot: "dini", def: "tiens" },
      { mot: "gôrâ", def: "assieds-toi" },
      { mot: "koy", def: "Vas-y (ordre) (homonyme de 'Seigneur')" },
      { mot: "koykât", def: "viens (ordre de venir)" },
      { mot: "tifak", def: "Demain" },
      { mot: "wa ccûdû", def: "ramassez" },
      { mot: "wa dina", def: "attrapez-le, attrapez ça" },
      { mot: "wa dini", def: "tenez" },
      { mot: "wa gôra", def: "asseyez-vous" },
      { mot: "wa ŋâ", def: "mangez" },
      { mot: "wa zûrû", def: "courez" },
      { mot: "yaw", def: "Viens — Ordre de venir" },
      { mot: "yíli", def: "Sors" },
      { mot: "zarosé", def: "Après-demain" },
      { mot: "zornád", def: "Avant-hier" },
      { mot: "zàrod", def: "Aujourd’hui" },
      { mot: "zûrû", def: "coures" },

      // --- NOMS COMMUNS ---
      { mot: "abér", def: "C'est grand ou gros" },
      { mot: "abôrâ", def: "le sorgho" },
      { mot: "aférig", def: "enclo" },
      { mot: "akatab", def: "Une écriture" },
      { mot: "al-fâjér", def: "Le matin" },
      { mot: "alwâq", def: "L'heure" },
      { mot: "Ammûnṣṣû", def: "La nourriture" },
      { mot: "asimid", def: "le semoule de blé" },
      { mot: "aṣahar", def: "couvercle" },
      { mot: "atri", def: "L'étoile" },
      { mot: "ažžãmán", def: "Le temps" },
      { mot: "bàngû", def: "Le puits" },
      { mot: "bangû", def: "La tête" },
      { mot: "bààri", def: "Le cheval" },
      { mot: "féji", def: "Le mouton" },
      { mot: "fûfû", def: "Le froid" },
      { mot: "gûngû", def: "Le ventre" },
      { mot: "gànda", def: "La terre ou le pays" },
      { mot: "hàmû", def: "La viande" },
      { mot: "hanjén", def: "Les oreilles" },
      { mot: "hâwrû", def: "Le repas" },

      { mot: "jínjiri", def: "La prière" },
      { mot: "jî", def: "L'huile" },
      { mot: "kanmba", def: "La main" },
      { mot: "kanmbén", def: "Les mains" },
      { mot: "kôṛà", def: "La chaleur" },
      { mot: "mô", def: "L'œil" },
      { mot: "môon", def: "Les yeux" },
      { mot: "abăkaḍ", def: "péché / faute" },
      { mot: "tàfɣat", def: "le riz" },
      { mot: "tàlast", def: "L'obscurité" },
      { mot: "tànžat", def: "le haricot" },
      { mot: "tôrouf", def: "La voiture" },
      { mot: "tûgûdû", def: "L'arbre" },
      { mot: "úṣûm", def: "Le jeûne" },
      { mot: "yéy", def: "La fraîcheur" },
      { mot: "yow", def: "La chamelle" },
      { mot: "zûkmûź", def: "Grattes (ordre de gratter)" },

      { mot: "âcckâr", def: "L'ongle" },
      { mot: "âyâr", def: "La lune" },
      { mot: "ălbüṣül", def: "l'oignon" },
      { mot: "ḥaïni", def: "le mil" },
      { mot: "Ítràn", def: "Les étoiles" },

      // --- PRONOMS PERSONNELS ---
      { mot: "a", def: "il, elle, ça" },
      { mot: "anga", def: "lui, il, elle" },
      { mot: "andi", def: "vous" },
      { mot: "àrî", def: "nous" },
      { mot: "aɣày", def: "moi" },
      { mot: "ɣa", def: "je" },
      { mot: "ɣab", def: "je (en action)" },
      { mot: "nib", def: "tu (en action)" },
      { mot: "ib", def: "ils/elles (en action)" },
      { mot: "mané?", def: "Où?" },
      { mot: "mànà", def: "Il, c'est où ?" },
      { mot: "nîn", def: "Toi" },
      { mot: "ni", def: "tu" }

    ];

    let index = 0;

    function afficherMot() {
      const motActuel = mots[index];
      document.getElementById("motTexte").innerText = motActuel.mot;
      document.getElementById("definition").innerText = motActuel.def;
      document.getElementById("compteur").innerText = `${index + 1} / ${mots.length}`;
    }

    function motSuivant() {
      index = (index + 1) % mots.length;
      afficherMot();
    }

    function motPrecedent() {
      index = (index - 1 + mots.length) % mots.length;
      afficherMot();
    }

    window.onload = afficherMot;
  </script>
</body>
</html>
